<!DOCTYPE html>
<html>
<head>
<title>MAHA DBT Scholarship Form</title>
</head>

<body>
<h5> sanjana CS25109</h5>

<h2>MAHA DBT Scholarship Application Form</h2>

<form>

<fieldset>
<legend>Personal Information</legend>

<label>Full Name:</label>
<input type="text" name="name"><br><br>

<label>Date of Birth:</label>
<input type="date" name="dob"><br><br>

<label>Gender:</label>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other

</fieldset>

<br>

<fieldset>
<legend>Educational Details</legend>

<label>Course:</label>
<input type="text" name="course"><br><br>

<label>College Name:</label>
<input type="text" name="college"><br><br>

<label>Year of Study:</label>
<select>
<option>First Year</option>
<option>Second Year</option>
<option>Third Year</option>
<option>Final Year</option>
</select>

</fieldset>

<br>

<fieldset>
<legend>Scholarship Details</legend>

<label>Category:</label>
<select>
<option>Open</option>
<option>OBC</option>
<option>SC</option>
<option>ST</option>
<option>NT</option>
</select>

<br><br>

<label>Scholarship Type:</label><br>
<input type="checkbox"> Tuition Fee Scholarship<br>
<input type="checkbox"> Hostel Scholarship<br>
<input type="checkbox"> Maintenance Allowance

</fieldset>

<br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</body>
</html>
